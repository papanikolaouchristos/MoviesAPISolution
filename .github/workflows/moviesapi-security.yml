name: MoviesAPI Security Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"


jobs:
  security-scan:

    runs-on: ubuntu-latest

    steps:

      # -----------------------------
      # CHECKOUT
      # -----------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4


      # -----------------------------
      # .NET BUILD
      # -----------------------------

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"


      - name: Restore Dependencies
        run: dotnet restore


      - name: Build Application
        run: dotnet build --configuration Release --no-restore


      # -----------------------------
      # SEMGREP SAST
      # -----------------------------

      - name: Run Semgrep
        continue-on-error: true
        uses: semgrep/semgrep-action@v1
        env:
          SEMGREP_VERSION: "latest"
        with:
          config: ./semgrep-rules
          generateSarif: "1"
           
      - name: Save Semgrep Results
        if: always()
        run: |
          if [ -f semgrep.sarif ]; then
            echo "Semgrep report found"
            cp semgrep.sarif semgrep-results.sarif
          else
            echo "No Semgrep report found"
          fi

      - name: Create TruffleHog Ignore List
        run: |
          cat <<EOF > .trufflehog-exclude
          .git
          bin
          obj
          trufflehog-report.json
          semgrep-results.sarif
          trivy-report.json
          EOF 


      # -----------------------------
      # TRUFFLEHOG SECRET SCAN
      # -----------------------------

      - name: Run TruffleHog Secret Scan
        continue-on-error: true
        run: |
      
          docker run --rm \
            -v ${{ github.workspace }}:/tmp \
            -w /tmp \
            ghcr.io/trufflesecurity/trufflehog:latest \
            filesystem /tmp \
            --exclude-paths=/tmp/.trufflehog-exclude \
            --json \
            --no-update \
            > trufflehog-report.json || true
      
      
          if grep -q '"DetectorName"' trufflehog-report.json
          then
            echo "❌ Secrets detected by TruffleHog"
            cat trufflehog-report.json
            exit 1
          else
            echo "✅ TruffleHog clean"
          fi
      

      # -----------------------------
      # DOCKER BUILD
      # -----------------------------

      - name: Build Docker Image
        continue-on-error: true
        run: |
          docker build -t moviesapi .


      # -----------------------------
      # TRIVY SCAN
      # -----------------------------

      - name: Run Trivy Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: moviesapi
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: 0
          ignore-unfixed: true


      # -----------------------------
      # RUN APPLICATION
      # -----------------------------

      - name: Run MoviesAPI Container
        continue-on-error: true
        run: |
          docker run -d \
          --name moviesapi-container \
          -p 8080:8080 \
          moviesapi


      - name: Wait API
        run: |
          sleep 30


      # -----------------------------
      # OWASP ZAP DAST
      # -----------------------------

      - name: OWASP ZAP Scan
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8080


      # -----------------------------
      # SQLMAP
      # -----------------------------

      - name: Install SQLMap
        run: |
          git clone --depth 1 https://github.com/sqlmapproject/sqlmap.git


      - name: Run SQLMap
        continue-on-error: true
        run: |

          python sqlmap/sqlmap.py \
          -u "http://localhost:8080/api/Movies/search?title=Batman" \
          -p title \
          --level=5 \
          --risk=3 \
          --batch \
          | tee sqlmap-output.txt



      # -----------------------------
      # UPLOAD REPORTS
      # -----------------------------

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep-report.json
            trivy-report.json
            sqlmap-output.txt
            trufflehog-report.json
          if-no-files-found: warn



      # -----------------------------
      # SECURITY GATE
      # -----------------------------

      - name: Security Gate
        if: always()
        run: |

          echo "================================"
          echo "Running Security Gate"
          echo "================================"


          FAILED=false


          # -------------------------
          # SEMGREP CHECK
          # -------------------------

             # SEMGREP CHECK
          if [ -f semgrep-results.sarif ]; then
         
            FINDINGS=$(jq '.runs[0].results | length' semgrep-results.sarif)
         
            if [ "$FINDINGS" -gt 0 ]; then
              echo "❌ Semgrep vulnerabilities detected"
              echo "Findings: $FINDINGS"
              FAILED=true
            else
              echo "✅ Semgrep clean"
            fi
         
          else
            echo "⚠️ Semgrep report missing"
          fi


          # -------------------------
          # TRUFFLEHOG CHECK
          # -------------------------

          if [ -f trufflehog-report.json ]; then

            SECRETS=$(wc -l < trufflehog-report.json)

            if [ "$SECRETS" -gt 0 ]; then

              echo "❌ Secrets detected by TruffleHog"
              cat trufflehog-report.json
              FAILED=true

            else

              echo "✅ TruffleHog clean"

            fi

          else

            echo "⚠️ TruffleHog report missing"

          fi
         

          # -------------------------
          # TRIVY CHECK
          # -------------------------

          if [ -f trivy-report.json ]; then

            VULNS=$(grep -o '"VulnerabilityID"' trivy-report.json | wc -l)


            if [ "$VULNS" -gt 0 ]; then

              echo "❌ Trivy detected vulnerabilities"
              FAILED=true

            else

              echo "✅ Trivy clean"

            fi

          fi



          # -------------------------
          # SQLMAP CHECK
          # -------------------------

          if [ -f sqlmap-output.txt ]; then

        
            if grep -qi "is vulnerable" sqlmap-output.txt || \
               grep -qi "parameter.*is injectable" sqlmap-output.txt || \
               grep -qi "sql injection vulnerability" sqlmap-output.txt
            then
            
                echo "❌ SQL Injection detected"
                FAILED=true
            
            else
            
                echo "✅ SQLMap clean"
            
            fi


          fi



          # -------------------------
          # FINAL DECISION
          # -------------------------

          if [ "$FAILED" = true ]; then

            echo ""
            echo "================================"
            echo " SECURITY GATE FAILED "
            echo " Vulnerabilities detected "
            echo "================================"

            exit 1

          else

            echo ""
            echo "================================"
            echo " SECURITY GATE PASSED "
            echo "================================"

          fi



      # -----------------------------
      # CLEANUP
      # -----------------------------

      - name: Stop Container
        if: always()
        run: |

          docker stop moviesapi-container || true

          docker rm moviesapi-container || true