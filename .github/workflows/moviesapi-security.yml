name: MoviesAPI Security Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"


jobs:
  security-scan:

    runs-on: ubuntu-latest

    steps:

      # -----------------------------
      # CHECKOUT
      # -----------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4


      # -----------------------------
      # .NET BUILD
      # -----------------------------

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"


      - name: Restore Dependencies
        run: dotnet restore


      - name: Build Application
        run: dotnet build --configuration Release --no-restore


      # -----------------------------
      # SEMGREP SAST
      # -----------------------------

      - name: Run Semgrep
        continue-on-error: true
        run: |
          pip install semgrep

          semgrep \
          --config ./semgrep-rules \
          --json \
          --output semgrep-report.json \
          .


      # -----------------------------
      # TRUFFLEHOG SECRET SCAN
      # -----------------------------

      - name: Run TruffleHog
        continue-on-error: true
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified


      # -----------------------------
      # DOCKER BUILD
      # -----------------------------

      - name: Build Docker Image
        continue-on-error: true
        run: |
          docker build -t moviesapi .


      # -----------------------------
      # TRIVY SCAN
      # -----------------------------

      - name: Run Trivy Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: moviesapi
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: 0
          ignore-unfixed: true


      # -----------------------------
      # RUN APPLICATION
      # -----------------------------

      - name: Run MoviesAPI Container
        continue-on-error: true
        run: |
          docker run -d \
          --name moviesapi-container \
          -p 8080:8080 \
          moviesapi


      - name: Wait API
        run: |
          sleep 30


      # -----------------------------
      # OWASP ZAP DAST
      # -----------------------------

      - name: OWASP ZAP Scan
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8080


      # -----------------------------
      # SQLMAP
      # -----------------------------

      - name: Install SQLMap
        run: |
          git clone --depth 1 https://github.com/sqlmapproject/sqlmap.git


      - name: Run SQLMap
        continue-on-error: true
        run: |

          python sqlmap/sqlmap.py \
          -u "http://localhost:8080/api/Movies/search?title=Batman" \
          -p title \
          --level=5 \
          --risk=3 \
          --batch \
          | tee sqlmap-output.txt



      # -----------------------------
      # UPLOAD REPORTS
      # -----------------------------

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep-report.json
            trivy-report.json
            sqlmap-output.txt
          if-no-files-found: warn



      # -----------------------------
      # SECURITY GATE
      # -----------------------------

      - name: Security Gate
        if: always()
        run: |

          echo "================================"
          echo "Running Security Gate"
          echo "================================"


          FAILED=false


          # -------------------------
          # SEMGREP CHECK
          # -------------------------

          if [ -f semgrep-report.json ]; then

            FINDINGS=$(cat semgrep-report.json | grep -o '"check_id"' | wc -l)

            if [ "$FINDINGS" -gt 0 ]; then

              echo "❌ Semgrep detected vulnerabilities"
              FAILED=true

            else

              echo "✅ Semgrep clean"

            fi

          fi



          # -------------------------
          # TRIVY CHECK
          # -------------------------

          if [ -f trivy-report.json ]; then

            VULNS=$(grep -o '"VulnerabilityID"' trivy-report.json | wc -l)


            if [ "$VULNS" -gt 0 ]; then

              echo "❌ Trivy detected vulnerabilities"
              FAILED=true

            else

              echo "✅ Trivy clean"

            fi

          fi



          # -------------------------
          # SQLMAP CHECK
          # -------------------------

          if [ -f sqlmap-output.txt ]; then


            if grep -qi "injectable" sqlmap-output.txt || \
               grep -qi "is vulnerable" sqlmap-output.txt
            then

              echo "❌ SQL Injection detected"
              FAILED=true

            else

              echo "✅ SQLMap clean"

            fi


          fi



          # -------------------------
          # FINAL DECISION
          # -------------------------

          if [ "$FAILED" = true ]; then

            echo ""
            echo "================================"
            echo " SECURITY GATE FAILED "
            echo " Vulnerabilities detected "
            echo "================================"

            exit 1

          else

            echo ""
            echo "================================"
            echo " SECURITY GATE PASSED "
            echo "================================"

          fi



      # -----------------------------
      # CLEANUP
      # -----------------------------

      - name: Stop Container
        if: always()
        run: |

          docker stop moviesapi-container || true

          docker rm moviesapi-container || true